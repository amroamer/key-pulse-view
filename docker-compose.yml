services:
  api:
    build:
      context: ./server
    container_name: kpv-api
    ports:
      - "8765:8765"
    environment:
      OLLAMA_HOST: http://ollama-shared:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      DATA_DIR: /data
    volumes:
      - ./server:/app
      - ./src/data:/data:ro
    command: uvicorn main:app --host 0.0.0.0 --port 8765 --reload
    restart: unless-stopped
    networks:
      kpv-network:
      kpmg-network:
        aliases:
          - kpv-api

networks:
  kpv-network:
    driver: bridge
  kpmg-network:
    external: true
    name: kpmg-infra_kpmg-network