server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API proxy — must come before the /khda/ static handler. Strips the
    # /khda prefix because the FastAPI app mounts routes at /api/*.
    location /khda/api/ {
        proxy_pass http://kpv-api:8765/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streaming chat (SSE): keep the connection open and don't buffer.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        chunked_transfer_encoding on;
    }

    # Bare /khda → /khda/ so users (and upstream proxies) hitting the
    # canonical /khda entry land on the SPA. Vite emits asset URLs under
    # /khda/ so the trailing slash is required for them to resolve.
    location = /khda {
        return 301 /khda/;
    }

    location /khda/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /khda/index.html;
    }

    location = / {
        return 302 /khda/;
    }

    location /health {
        access_log off;
        return 200 "ok\n";
    }
}