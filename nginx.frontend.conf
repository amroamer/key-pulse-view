server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /khda/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /khda/index.html;
    }

    location = / {
        return 302 /khda/;
    }

    location /health {
        access_log off;
        return 200 "ok\n";
    }
}